# Grafana Data Source 프로비저닝
# ───────────────────────
# Grafana 컨테이너가 시작될 때 이 파일을 읽어 Prometheus를 데이터 소스로 자동 등록한다.
# 수동으로 UI에서 Data Source를 추가할 필요가 없다.
# API 키나 상호작용 없이 코드로 인프라를 정의 = "선언적 프로비저닝".

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus # 대시보드 JSON과 바인딩할 명시적 UID 추가
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
