# Prometheus 설정
# HexWar 관측가능성 파이프라인의 메트릭 수집기.
# hexwar-exporter(Go)가 수집한 HexWar 서버 메트릭을 주기적으로 스크랩한다.

global:
  # 모든 job의 기본 스크랩 주기. 15초마다 각 대상의 /metrics를 GET.
  scrape_interval: 15s

  # 모든 job의 기본 스크랩 타임아웃. 대상이 10초 내에 응답하지 않으면 실패 처리.
  scrape_timeout: 10s

  # alert 룰 평가 주기. 15초마다 모든 alert 룰의 expr을 계산하여 임계 초과 여부를 판단.
  evaluation_interval: 15s

  # Prometheus 자체 메트릭의 라벨. 여러 Prometheus 인스턴스를 구분할 때 사용.
  external_labels:
    cluster: 'hexwar-local'

# alert 룰 파일 로드. 경로는 Prometheus 컨테이너 내부 기준.
rule_files:
  - 'alerts.yml'

# 스크랩 대상 정의
scrape_configs:
  # 쿠버네트스와의 연동을 위한 스크랩 설정
  - job_name: 'hexwar-exporter'
    scrape_interval: 15s
    sample_limit: 200 # 타겟 하나가 뱉을 수 있는 최대 시계열 수 제한 (카디널리티 폭발 방어선)
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # prometheus.io/scrape: "true" 어노테이션이 있는 파드만 수집
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      # prometheus.io/port 에 명시된 포트로 스크랩 대상 주소 변경
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      # 라벨로 서비스명 표시
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: service

  # ── 2. otel-collector: OTel Push 기반 서버 메트릭 ──
  # OTel Collector가 게임 서버로부터 Push 받은 메트릭을 /metrics에서 노출.
  - job_name: 'otel-collector'
    scrape_interval: 15s
    static_configs:
      - targets: ['hexwar-otel-collector:8889']
        labels:
          service: 'hexwar-otel-collector'

  # ── 3. Prometheus 자체 모니터링 ──
  # Prometheus의 자체 성능(메모리, 스크랩 지연, TSDB 크기 등)을 수집.
  # Prometheus가 자기 자신을 스크랩하는 패턴은 운영에서 표준적이다.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
