apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Namespace
metadata:
  name: game
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hexwar-exporter-config
  namespace: game
data:
  HEXWAR_MAX_WORKERS: "50"
  HEXWAR_SCRAPE_INTERVAL: "5s"
  HEXWAR_SCRAPE_TIMEOUT: "3s"
  HEXWAR_LISTEN: ":9091"
  # 사이드카 패턴 적용: 동일 파드 내의 게임 서버(localhost)를 타겟으로 지정
  HEXWAR_TARGETS: "game-server=http://localhost:5000/api/diagnostics/stats"

