apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hexwar-exporter-config
  namespace: monitoring
data:
  HEXWAR_MAX_WORKERS: "50"
  HEXWAR_SCRAPE_INTERVAL: "5s"
  HEXWAR_SCRAPE_TIMEOUT: "3s"
  HEXWAR_LISTEN: ":9091"
  # K8s 내부 DNS 규칙을 따르는 실제 C# 게임 서버 서비스 주소로 변경
  HEXWAR_TARGETS: "game-server=http://hexwar-server.game:5000/api/diagnostics/stats"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexwar-exporter
  namespace: monitoring
  labels:
    app: hexwar-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexwar-exporter
  template:
    metadata:
      labels:
        app: hexwar-exporter
    spec:
      containers:
      - name: exporter
        image: hexwar-exporter:latest # 실제 빌드된 이미지 경로로 대체
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9091
          name: metrics
        envFrom:
        - configMapRef:
            name: hexwar-exporter-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hexwar-exporter
  namespace: monitoring
  labels:
    app: hexwar-exporter
spec:
  ports:
  - port: 9091
    targetPort: metrics
    name: metrics
  selector:
    app: hexwar-exporter
  type: ClusterIP

# ---------------------------------------------------------------------
# [주의] 아래 HPA는 KEDA(ScaledObject) 도입으로 인해 충돌 방지 차원에서 비활성화(주석 처리) 되었습니다.
# KEDA가 내부적으로 새로운 HPA를 생성하므로, 이 코드가 활성화되어 있으면 파드 개수 계산에 충돌(Flapping)이 발생합니다.
