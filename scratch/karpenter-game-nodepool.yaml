# 1. KwokNodeClass: Karpenter가 사용할 실제 인프라 공급자를 KWOK으로 지정
apiVersion: karpenter.kwok.sh/v1alpha1
kind: KwokNodeClass
metadata:
  name: game-nodeclass
spec:
  # KWOK 컨트롤러가 이 클래스를 바탕으로 가짜 노드를 띄우도록 설정
  # 실제 인프라라면 EC2NodeClass에 AMI, Subnet, SecurityGroup 등이 들어갑니다.
---
# 2. NodePool: 게임 서버에 특화된 스케일링 정책 (요청하신 metadata.name: game 반영)
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: game
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.kwok.sh
        kind: KwokNodeClass
        name: game-nodeclass
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64", "arm64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"] # Spot 인스턴스 우선 활용으로 비용 절감
        # 게임 서버 전용 노드 라벨 부여 (파드 스케줄링 시 사용)
        - key: node-type
          operator: In
          values: ["game-server"]
  # Consolidation 정책: 노드가 낭비될 때(Underutilized) 빈 노드를 삭제하여 비용 절감 (Scale-in)
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h # 30일 경과 노드 교체
