# kind 종류
# Deployment - 파드 스케줄 관리
# ConfigMap - 동적 설정 정보
# Service - 네트워크 서비스
# HorizontalPodAutoscaler - 자동 스케일 관리

# Service - 네트워크 정의와 Deployment 연결

# k8s Prometheus + OTel Collector + Grafana가 정의되어 있다. 
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'hexwar-exporter'
        static_configs:
          - targets: ['hexwar-exporter.monitoring.svc.cluster.local:9091']
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['hexwar-otel-collector.monitoring.svc.cluster.local:8889']
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: "hexwar"
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-config
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'hexwar-dashboards'
        orgId: 1
        folder: 'HexWar'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  hexwar-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "-- Mixed --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "id": 1,
      "panels": [
        {
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "title": "Total Active WebSocket Connections",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(hexwar_connections)",
              "legendFormat": "Active Connections",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "red", "value": 80}]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "title": "Total Game Sessions",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(hexwar_sessions{state=\"total\"})",
              "legendFormat": "Total Sessions",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "title": "Active vs Finished Sessions",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(hexwar_sessions{state=\"active\"})",
              "legendFormat": "Active (Planning)",
              "refId": "A"
            },
            {
              "expr": "sum(hexwar_sessions{state=\"gameover\"})",
              "legendFormat": "GameOver",
              "refId": "B"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 4,
          "title": "Active Sessions Trend Over Time",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (node) (hexwar_sessions{state=\"active\"})",
              "legendFormat": "Active Session: {{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"drawStyle": "line", "lineInterpolation": "smooth"}
            }
          }
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 5,
          "title": "Server Memory Usage (Working Set)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "hexwar_working_set_bytes",
              "legendFormat": "{{node}} memory",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"drawStyle": "line", "lineInterpolation": "linear"},
              "unit": "decbytes"
            }
          }
        }
      ],
      "title": "HexWar Real-time Observability Dashboard",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v3.1.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.retention.time=1h'
        - '--storage.tsdb.retention.size=64MB'
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        - name: storage-volume
          mountPath: /prometheus
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
      - name: storage-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  ports:
  - port: 9090
    targetPort: web
    name: web
  selector:
    app: prometheus
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexwar-otel-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexwar-otel-collector
  template:
    metadata:
      labels:
        app: hexwar-otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.95.0
        args:
        - '--config=/etc/otelcol-contrib/config.yaml'
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 8889
          name: prometheus
        volumeMounts:
        - name: config-volume
          mountPath: /etc/otelcol-contrib
      volumes:
      - name: config-volume
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: hexwar-otel-collector
  namespace: monitoring
spec:
  ports:
  - port: 4317
    targetPort: otlp-grpc
    name: otlp-grpc
  - port: 4318
    targetPort: otlp-http
    name: otlp-http
  - port: 8889
    targetPort: prometheus
    name: prometheus
  selector:
    app: hexwar-otel-collector
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.4.0
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Viewer"
        ports:
        - containerPort: 3000
          name: web
        volumeMounts:
        - name: provisioning-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: provisioning-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards-json
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: provisioning-datasources
        configMap:
          name: grafana-provisioning-config
          items:
          - key: datasources.yml
            path: datasources.yml
      - name: provisioning-dashboards
        configMap:
          name: grafana-provisioning-config
          items:
          - key: dashboards.yml
            path: dashboards.yml
      - name: dashboards-json
        configMap:
          name: grafana-dashboards-config
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  ports:
  - port: 3000
    targetPort: web
    name: web
  selector:
    app: grafana
  type: LoadBalancer # 호스트 PC에서 고정 바인딩 경로로 접근 가능하게 LoadBalancer 설정
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi # 로컬 테스트용 2기가 용량 할당
